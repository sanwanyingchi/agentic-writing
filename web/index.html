<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Writing - 智能写作对比评测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .thinking-card { transition: all 0.3s ease; }
        .thinking-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .step-active { border-left-color: #3b82f6; background: #eff6ff; }
        .step-completed { border-left-color: #10b981; background: #f0fdf4; }
        .step-error { border-left-color: #ef4444; background: #fef2f2; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .text-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </div>
                        <span class="font-bold text-xl text-gray-900">Agentic Writing</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500">智能写作对比评测平台</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 输入区域 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                写作需求
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">请输入写作需求</label>
                    <textarea 
                        id="queryInput" 
                        rows="3" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                        placeholder="例如：写一篇小学作文，题目是'我的乐园'，300字..."
                    ></textarea>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">场景（可选）</label>
                        <select id="scenarioSelect" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500">
                            <option value="">自动识别</option>
                            <option value="essay_primary">小学作文</option>
                            <option value="essay_middle">初中作文</option>
                            <option value="essay">高中/高考/大学作文</option>
                            <option value="novel">网络小说</option>
                            <option value="xiaohongshu">小红书文案</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button 
                            id="generateBtn" 
                            onclick="startGeneration()"
                            class="px-6 py-2.5 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-medium rounded-xl hover:shadow-lg hover:scale-105 transition-all flex items-center gap-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                            开始生成
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 对比展示区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- Agent 输出区域 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-gray-200 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-semibold text-gray-900">🤖 Agent 输出</h3>
                            <p id="agentStats" class="text-xs text-gray-500 hidden"></p>
                        </div>
                    </div>
                    <div id="agentStatus" class="text-sm text-gray-500 flex items-center gap-2">
                        <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
                        <span id="statusText">等待生成</span>
                        <span id="etaText" class="text-xs text-orange-500 hidden">(预估 60-90 秒)</span>
                    </div>
                </div>

                <!-- 思考过程折叠区域 -->
                <div id="thinkingSection" class="hidden border-b border-gray-200">
                    <button 
                        onclick="toggleThinking()" 
                        class="w-full px-6 py-3 flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition-colors"
                    >
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                            <span class="font-medium text-gray-700">思考过程</span>
                            <span id="thinkingCount" class="px-2 py-0.5 bg-purple-100 text-purple-700 text-xs rounded-full">0</span>
                        </div>
                        <svg id="thinkingArrow" class="w-5 h-5 text-gray-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="thinkingContent" class="hidden max-h-96 overflow-y-auto bg-gray-50 p-4 space-y-2">
                        <!-- 思考步骤会在这里动态添加 -->
                    </div>
                </div>

                <!-- 生成内容 -->
                <div class="p-6">
                    <div id="agentOutput" class="prose max-w-none text-gray-700 leading-relaxed min-h-[200px]">
                        <div class="flex items-center justify-center h-full text-gray-400">
                            <div class="text-center">
                                <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                                </svg>
                                <p>点击"开始生成"按钮生成内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 用户内容区域 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 bg-gradient-to-r from-green-50 to-emerald-50 border-b border-gray-200 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="font-semibold text-gray-900">👤 我的内容</h3>
                            <p id="userStats" class="text-xs text-gray-500">0 字</p>
                        </div>
                    </div>
                    <label class="cursor-pointer px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 flex items-center gap-2 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                        </svg>
                        上传文件
                        <input type="file" id="fileInput" accept=".txt,.md,.docx" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                </div>
                <div class="p-6">
                    <textarea 
                        id="userInput" 
                        class="w-full h-[300px] p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-transparent resize-none"
                        placeholder="在此粘贴或输入您的内容..."
                        oninput="updateUserStats()"
                    ></textarea>
                </div>
            </div>
        </div>

        <!-- 对比评测按钮 -->
        <div class="flex justify-center mb-6">
            <button 
                id="compareBtn" 
                onclick="startComparison()"
                disabled
                class="px-8 py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white font-semibold rounded-xl hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 transition-all"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                开始对比评测
            </button>
        </div>

        <!-- 评测结果区域 -->
        <div id="resultSection" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                评测结果
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 总体结论 -->
                <div class="md:col-span-1">
                    <div id="verdictCard" class="p-6 rounded-2xl text-center">
                        <div id="verdictIcon" class="w-16 h-16 mx-auto mb-3 rounded-full flex items-center justify-center text-3xl"></div>
                        <h3 id="verdictTitle" class="text-xl font-bold mb-2"></h3>
                        <p id="verdictDesc" class="text-sm opacity-80"></p>
                    </div>
                </div>

                <!-- 维度得分 -->
                <div class="md:col-span-2">
                    <div class="space-y-4" id="dimensionsList">
                        <!-- 维度得分会在这里动态添加 -->
                    </div>
                </div>
            </div>

            <!-- 详细点评 -->
            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                <h4 class="font-medium text-gray-900 mb-2">详细点评</h4>
                <p id="reasoningText" class="text-gray-700 text-sm leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        // API 地址配置 - 本地开发用 localhost，生产环境用实际地址
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://agentic-writing-api.onrender.com';
        let agentText = '';
        let agentScenario = '';
        let thinkingSteps = [];

        // 切换思考过程折叠
        function toggleThinking() {
            const content = document.getElementById('thinkingContent');
            const arrow = document.getElementById('thinkingArrow');
            content.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
        }

        // 更新用户字数统计
        function updateUserStats() {
            const text = document.getElementById('userInput').value;
            const count = text.length;
            document.getElementById('userStats').textContent = `${count} 字`;
            updateCompareButton();
        }

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('userInput').value = e.target.result;
                updateUserStats();
            };
            reader.readAsText(file);
        }

        // 更新对比按钮状态
        function updateCompareButton() {
            const userText = document.getElementById('userInput').value;
            const btn = document.getElementById('compareBtn');
            btn.disabled = !agentText || !userText;
        }

        // 添加思考步骤
        function addThinkingStep(type, data) {
            const container = document.getElementById('thinkingContent');
            const stepDiv = document.createElement('div');
            
            let content = '';
            let icon = '';
            let bgClass = '';

            switch(type) {
                case 'header':
                    icon = '📋';
                    bgClass = 'bg-blue-50 border-blue-200';
                    content = data.text;
                    break;
                case 'plan':
                    icon = '📋';
                    bgClass = 'bg-indigo-50 border-indigo-200';
                    content = `<strong>执行计划：</strong><ul class="mt-1 ml-4 list-disc">${
                        data.steps.map(s => `<li>${s.skill} - ${s.purpose || ''}</li>`).join('')
                    }</ul>`;
                    break;
                case 'step':
                    icon = '▶️';
                    bgClass = 'step-active border-blue-300';
                    content = `<strong>步骤 ${data.idx}/${data.total}:</strong> ${data.skill}<br><span class="text-sm text-gray-600">${data.desc}</span>`;
                    break;
                case 'result':
                    icon = data.success ? '✅' : '❌';
                    bgClass = data.success ? 'step-completed border-green-300' : 'step-error border-red-300';
                    content = `<strong>结果:</strong> ${data.detail} ${data.tokens ? `(${data.tokens} tokens, ${data.latency}ms)` : ''}`;
                    break;
                case 'quality_gate':
                    icon = data.passed ? '✓' : '✗';
                    bgClass = data.passed ? 'step-completed border-green-300' : 'step-error border-red-300';
                    content = `<strong>质量门控:</strong> ${data.passed ? '通过' : '未通过'} (score=${data.score?.toFixed(2)}) ${data.detail ? `<br><span class="text-sm text-gray-600">${data.detail}</span>` : ''}`;
                    break;
                case 'retry':
                    icon = '🔄';
                    bgClass = 'bg-yellow-50 border-yellow-300';
                    content = `<strong>回退重写:</strong> ${data.target} (第${data.attempt}/${data.max}次)`;
                    break;
            }

            stepDiv.className = `thinking-card p-3 rounded-lg border-l-4 text-sm ${bgClass} fade-in`;
            stepDiv.innerHTML = `<div class="flex gap-2">${icon ? `<span>${icon}</span>` : ''}<div class="flex-1">${content}</div></div>`;
            container.appendChild(stepDiv);
            container.scrollTop = container.scrollHeight;

            thinkingSteps.push({type, data});
            document.getElementById('thinkingCount').textContent = thinkingSteps.length;
        }

        // 预估时间配置
        const ETA_CONFIG = {
            'essay_primary': { time: 40, steps: 5, name: '小学作文' },
            'essay_middle': { time: 50, steps: 5, name: '初中作文' },
            'essay': { time: 80, steps: 6, name: '高中作文' },
            'novel': { time: 90, steps: 5, name: '网络小说' },
            'xiaohongshu': { time: 30, steps: 4, name: '小红书文案' },
            'default': { time: 60, steps: 5, name: '通用写作' }
        };

        // 开始生成
        async function startGeneration() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('请输入写作需求');
                return;
            }

            const scenario = document.getElementById('scenarioSelect').value;
            const config = ETA_CONFIG[scenario] || ETA_CONFIG['default'];
            
            // 重置状态
            agentText = '';
            agentScenario = '';
            thinkingSteps = [];
            document.getElementById('thinkingContent').innerHTML = '';
            document.getElementById('thinkingCount').textContent = '0';
            document.getElementById('thinkingSection').classList.remove('hidden');
            document.getElementById('agentOutput').innerHTML = `
                <div class="flex flex-col items-center justify-center h-40 space-y-3">
                    <div class="loading-pulse text-blue-500 text-lg">正在启动 ${config.name} 生成流程...</div>
                    <div class="text-sm text-gray-500">预估耗时 ${config.time}-${config.time + 30} 秒，请耐心等待</div>
                    <div class="w-64 h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 to-purple-600 rounded-full transition-all duration-1000" style="width: 5%"></div>
                    </div>
                    <div class="text-xs text-gray-400">步骤: <span id="stepCounter">0</span>/${config.steps}</div>
                </div>
            `;
            document.getElementById('statusText').textContent = '生成中...';
            document.getElementById('etaText').classList.remove('hidden');
            
            // 自动展开思考过程
            document.getElementById('thinkingContent').classList.remove('hidden');
            document.getElementById('thinkingArrow').classList.add('rotate-180');
            
            // 更新进度条
            let progress = 5;
            const progressBar = document.getElementById('progressBar');
            const stepCounter = document.getElementById('stepCounter');
            const progressInterval = setInterval(() => {
                if (progress < 90 && agentText === '') {
                    progress += Math.random() * 3;
                    progressBar.style.width = Math.min(progress, 90) + '%';
                }
            }, 1000);

            try {
                // 使用 fetch 接收流式数据
                const response = await fetch(`${API_BASE}/api/generate/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, scenario })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'complete') {
                                    clearInterval(progressInterval);
                                    agentText = data.final_text;
                                    agentScenario = data.scenario;
                                    document.getElementById('agentOutput').innerHTML = `<div class="prose">${formatText(agentText)}</div>`;
                                    document.getElementById('agentStats').textContent = `${agentText.length} 字 | 总耗时 ${data.stats?.total_latency_ms || 0}ms`;
                                    document.getElementById('agentStats').classList.remove('hidden');
                                    document.getElementById('statusText').textContent = '生成完成';
                                    document.getElementById('etaText').classList.add('hidden');
                                    if (progressBar) progressBar.style.width = '100%';
                                    if (stepCounter) stepCounter.textContent = config.steps;
                                    updateCompareButton();
                                } else if (data.type === 'error') {
                                    clearInterval(progressInterval);
                                    document.getElementById('agentOutput').innerHTML = `<div class="text-red-500">生成失败: ${data.message}</div>`;
                                    document.getElementById('statusText').textContent = '生成失败';
                                    document.getElementById('etaText').classList.add('hidden');
                                } else {
                                    addThinkingStep(data.type, data);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                clearInterval(progressInterval);
                document.getElementById('agentOutput').innerHTML = `<div class="text-red-500">请求失败: ${error.message}</div>`;
                document.getElementById('statusText').textContent = '请求失败';
                document.getElementById('etaText').classList.add('hidden');
            }
        }

        // 格式化文本
        function formatText(text) {
            return text.replace(/\n/g, '<br>').replace(/【([^】]+)】/g, '<strong>【$1】</strong>');
        }

        // 开始对比评测
        async function startComparison() {
            const userText = document.getElementById('userInput').value.trim();
            if (!agentText || !userText) return;

            const btn = document.getElementById('compareBtn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 评测中...';

            try {
                const response = await fetch(`${API_BASE}/api/compare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: document.getElementById('queryInput').value,
                        scenario: agentScenario || 'essay',
                        agent_text: agentText,
                        user_text: userText
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showComparisonResult(data);
                } else {
                    alert('评测失败: ' + data.message);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg> 开始对比评测';
            }
        }

        // 显示对比结果
        function showComparisonResult(data) {
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('hidden');

            // 总体结论
            const verdictCard = document.getElementById('verdictCard');
            const verdictIcon = document.getElementById('verdictIcon');
            const verdictTitle = document.getElementById('verdictTitle');
            const verdictDesc = document.getElementById('verdictDesc');

            if (data.verdict === 'A') {
                verdictCard.className = 'p-6 rounded-2xl text-center bg-gradient-to-br from-blue-500 to-blue-600 text-white';
                verdictIcon.textContent = '🤖';
                verdictTitle.textContent = 'Agent 胜出';
                verdictDesc.textContent = `Agent 得分 ${data.agent_score.toFixed(2)} vs 您的 ${data.user_score.toFixed(2)}`;
            } else if (data.verdict === 'B') {
                verdictCard.className = 'p-6 rounded-2xl text-center bg-gradient-to-br from-green-500 to-green-600 text-white';
                verdictIcon.textContent = '👤';
                verdictTitle.textContent = '您的内容胜出';
                verdictDesc.textContent = `您的得分 ${data.user_score.toFixed(2)} vs Agent ${data.agent_score.toFixed(2)}`;
            } else {
                verdictCard.className = 'p-6 rounded-2xl text-center bg-gradient-to-br from-orange-500 to-orange-600 text-white';
                verdictIcon.textContent = '🤝';
                verdictTitle.textContent = '平局';
                verdictDesc.textContent = `双方得分均为 ${data.agent_score.toFixed(2)}`;
            }

            // 维度得分
            const dimensionsList = document.getElementById('dimensionsList');
            dimensionsList.innerHTML = '';
            
            for (const [dim, scores] of Object.entries(data.dimensions)) {
                const agentScore = scores.agentic;
                const userScore = scores.baseline;
                const winner = agentScore > userScore ? 'agent' : userScore > agentScore ? 'user' : 'tie';
                
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-lg';
                div.innerHTML = `
                    <span class="text-sm font-medium text-gray-700">${dim}</span>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500">Agent</span>
                            <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${agentScore * 20}%"></div>
                            </div>
                            <span class="text-sm font-semibold ${winner === 'agent' ? 'text-blue-600' : 'text-gray-600'}">${agentScore}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500">您</span>
                            <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full bg-green-500 rounded-full" style="width: ${userScore * 20}%"></div>
                            </div>
                            <span class="text-sm font-semibold ${winner === 'user' ? 'text-green-600' : 'text-gray-600'}">${userScore}</span>
                        </div>
                    </div>
                `;
                dimensionsList.appendChild(div);
            }

            // 详细点评
            document.getElementById('reasoningText').textContent = data.reasoning;

            // 滚动到结果区域
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
